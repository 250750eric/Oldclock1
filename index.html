<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIENT LED 萬年曆 - 網路定位版</title>
    <style>
        :root {
            --led-red: #ff0000;
            --led-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            --bg-silver: #c0c0c0;
            --panel-blue: #4a7694;
        }

        body {
            background-color: #2a2a2a; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .clock-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .clock-container {
            width: 540px;
            max-width: 100%;
            background-color: var(--bg-silver);
            border: 8px solid #ddd;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            padding: 15px 0 0 0;
            display: flex;
            flex-direction: column;
        }

        .brand {
            text-align: center;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 900;
            margin-bottom: 20px;
            color: #1a1a1a;
            letter-spacing: 3px;
        }

        .digit-box {
            background-color: #000;
            color: var(--led-red);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: bold;
            text-shadow: var(--led-shadow);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #333;
        }

        .upper-panel {
            padding: 0 6% 20px 6%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: clamp(14px, 3.5vw, 17px);
            font-weight: bold;
            color: #222;
        }

        .left-part, .right-part { display: flex; align-items: center; gap: 8px; }

        .lunar-box { 
            font-size: clamp(16px, 4vw, 22px); 
            min-width: 110px; 
            padding: 4px 6px;
        }

        .day-display { font-size: clamp(30px, 8vw, 48px); min-width: 80px; }

        .bottom-panel {
            background-color: var(--panel-blue);
            padding: 15px 10px;
            display: grid;
            grid-template-columns: 80px 1fr;
            align-items: center;
            border-top: 5px solid #333;
        }

        .am-pm-indicator {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: clamp(11px, 2.5vw, 14px);
            color: #000;
            font-weight: bold;
            padding-left: 5px;
        }

        .indicator-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 8px; height: 8px; background-color: #222; border-radius: 50%; }
        .dot.active { background-color: var(--led-red); box-shadow: var(--led-shadow); }

        .time-box {
            font-size: clamp(35px, 10vw, 60px);
            letter-spacing: 4px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="clock-wrapper">
    <div class="clock-container">
        <div class="brand">👑 ORIENT</div>

        <div class="upper-panel">
            <div class="row">
                <div class="left-part">
                    <span>西元</span>
                    <div class="digit-box" id="year">----</div><span>年</span>
                </div>
                <div class="right-part">
                    <div class="digit-box" id="month" style="min-width: 45px;">--</div><span>月</span>
                </div>
            </div>

            <div class="row">
                <div class="left-part">
                    <span>星期</span>
                    <div class="digit-box" id="week" style="min-width: 50px;">--</div>
                </div>
                <div class="right-part">
                    <div class="digit-box day-display" id="day">--</div><span>日</span>
                </div>
            </div>

            <div class="row">
                <div class="left-part">
                    <span>農曆</span>
                    <div class="digit-box lunar-box" id="lunar">--月--</div><span>日</span>
                </div>
                <div class="right-part">
                    <span>溫度</span>
                    <div class="digit-box" id="temp" style="min-width: 45px;">--</div><span>℃</span>
                </div>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="am-pm-indicator">
                <div class="indicator-item">上午<div class="dot" id="dot-am"></div></div>
                <div class="indicator-item">下午<div class="dot" id="dot-pm"></div></div>
            </div>
            <div class="digit-box time-box" id="time">00:00:00</div>
        </div>
    </div>
</div>

<script>
    // 獲取天氣溫度的函數
    async function getTemperature(lat, lon) {
        try {
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('temp').innerText = temp;
        } catch (error) {
            console.error("無法取得溫度資料", error);
            document.getElementById('temp').innerText = "25"; // 失敗時的預設值
        }
    }

    // 初始化定位
    function initLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    getTemperature(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    console.log("定位遭拒或失敗，改用預設溫度");
                    document.getElementById('temp').innerText = "25";
                }
            );
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('year').innerText = now.getFullYear();
        document.getElementById('month').innerText = String(now.getMonth() + 1).padStart(2, '0');
        document.getElementById('day').innerText = String(now.getDate()).padStart(2, '0');

        const weeks = ["日", "一", "二", "三", "四", "五", "六"];
        document.getElementById('week').innerText = weeks[now.getDay()];

        const lunarFormatter = new Intl.DateTimeFormat('zh-u-ca-chinese', { month: 'long', day: 'numeric' });
        const lunarParts = lunarFormatter.format(now);
        const cleanLunar = lunarParts.replace(/.*年/, '').replace(' ', '');
        document.getElementById('lunar').innerText = cleanLunar;

        const h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('time').innerText = `${String(h).padStart(2, '0')}:${m}:${s}`;

        if (h < 12) {
            document.getElementById('dot-am').classList.add('active');
            document.getElementById('dot-pm').classList.remove('active');
        } else {
            document.getElementById('dot-am').classList.remove('active');
            document.getElementById('dot-pm').classList.add('active');
        }
    }
    
    // 每小時更新一次溫度，時鐘則每秒更新
    initLocation();
    setInterval(initLocation, 3600000); 
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
